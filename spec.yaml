schemaVersion: "1"
kind: agent
name: agy
displayName: Antigravity CLI (agy)
description: Google Antigravity CLI in a Docker Sandbox.

agent:
  # Base image with shell and Docker daemon included
  image: "docker/sandbox-templates:shell-docker"
  # Persist OAuth token, history, and settings across sandbox restarts
  entrypoint:
    run:
      - agy

environment:
  variables:
    # Force agy into terminal OAuth flow instead of opening a browser
    SSH_CONNECTION: "sandbox 0 sandbox 0"

commands:
  install:
    # Runs once when the sandbox is first created
    - command: "curl -fsSL https://antigravity.google/cli/install.sh | bash"
      # Install as agent user — root would place binary outside PATH
      user: "1000"
      description: Install agy
